name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Environment diagnostics
        run: |
          echo "=== pnpm version ==="; pnpm --version
          echo "=== node version ==="; node --version
          echo "=== pnpm config list ==="; pnpm config list || true
          echo "=== pnpm-workspace.yaml ==="; cat pnpm-workspace.yaml || echo "(missing)"
          echo "=== package.json pnpm field ==="; node -e "console.log(JSON.stringify(require('./package.json').pnpm || null, null, 2))"
          echo "=== package.json packageManager ==="; node -e "console.log(require('./package.json').packageManager || '(none)')"

      - run: pnpm install --frozen-lockfile

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm lint

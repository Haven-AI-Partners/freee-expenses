name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v6
        with:
          version: 10.33.0

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: pnpm

      - name: Install with diagnostics
        id: install
        run: |
          {
            echo "### pnpm install diagnostics"
            echo ""
            echo "- pnpm: \`$(pnpm --version)\`"
            echo "- node: \`$(node --version)\`"
            echo "- which pnpm: \`$(which pnpm)\`"
          } > /tmp/diag.md
          set +e
          pnpm install --frozen-lockfile 2>&1 | tee /tmp/install.log
          CODE=${PIPESTATUS[0]}
          set -e
          {
            echo ""
            echo "**pnpm install output (exit $CODE)**"
            echo '```'
            tail -40 /tmp/install.log
            echo '```'
          } >> /tmp/diag.md
          exit $CODE

      - name: Post diagnostics on failure
        if: failure() && steps.install.outcome == 'failure' && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('/tmp/diag.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '<!-- pnpm-install-diag -->\n' + body,
            });

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm lint
